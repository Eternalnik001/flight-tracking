name: ci

# Runs the unit tests on every push / PR. No secrets needed — the suite is
# fully offline (retry/analysis/storage logic, with an in-memory SQLite DB).
on:
  push:
    branches: [main]
    paths: ["tracker/**", "tests/**", "requirements*.txt", "pytest.ini", ".github/workflows/ci.yml"]
  pull_request:
    paths: ["tracker/**", "tests/**", "requirements*.txt", "pytest.ini"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: python -m pytest
