<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BLR → domestic India flight tracker</title>
  <style>
    :root { --line:#dde1e6; --muted:#667085; --bg:#f7f8fa; --up:#b00020; --down:#0a7d2c; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; color:#1a1a1a;
           margin:0; background:var(--bg); }
    .wrap { max-width: 960px; margin: 0 auto; padding: 24px 16px 64px; }
    h1 { font-size: 22px; margin: 0 0 2px; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:20px; }
    h2 { font-size: 15px; margin: 0 0 12px; }
    .row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
    input[type=search] { flex:1; min-width:200px; padding:9px 11px; border:1px solid var(--line);
                         border-radius:8px; font-size:14px; }
    button { background:#111827; color:#fff; border:0; border-radius:8px; padding:9px 14px;
             font-size:14px; cursor:pointer; }
    button.secondary { background:#fff; color:#111827; border:1px solid var(--line); }
    button:disabled { opacity:.5; cursor:default; }
    .chips { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0 0; }
    .chip { display:inline-flex; align-items:center; gap:6px; background:#eef2ff; color:#3730a3;
            border-radius:999px; padding:4px 10px; font-size:13px; }
    .chip b { font-weight:700; }
    .chip span { cursor:pointer; font-weight:700; }
    .opts { max-height:260px; overflow:auto; border:1px solid var(--line); border-radius:8px; margin-top:10px; }
    .opt { display:flex; align-items:center; gap:10px; padding:8px 12px; border-bottom:1px solid #eef0f3;
           cursor:pointer; font-size:14px; }
    .opt:last-child { border-bottom:0; }
    .opt:hover { background:#f5f7ff; }
    .opt .code { font-weight:700; width:42px; }
    .opt .st { color:var(--muted); margin-left:auto; font-size:12px; }
    table { border-collapse:collapse; width:100%; font-size:13px; }
    th, td { border:1px solid var(--line); padding:8px 10px; text-align:left; }
    th { background:#f2f4f7; }
    .price { font-weight:700; }
    .down { color:var(--down); } .up { color:var(--up); }
    .empty { color:var(--muted); font-size:13px; }
    .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#111827;
             color:#fff; padding:10px 16px; border-radius:8px; font-size:13px; opacity:0;
             transition:opacity .2s; pointer-events:none; }
    .toast.show { opacity:1; }
    .banner { background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; font-size:13px;
              border-radius:8px; padding:10px 12px; margin-bottom:20px; }
    .greeting { font-size:15px; color:#3730a3; background:#eef2ff; border:1px solid #c7d2fe;
                border-radius:8px; padding:10px 14px; margin:0 0 16px; font-weight:600; }
  </style>
</head>
<body>
  <div class="wrap">
    <p id="greeting" class="greeting" style="display:none"></p>
    <h1>Bengaluru (BLR) → domestic India</h1>
    <p class="sub">Origin is locked to Bengaluru. Pick destinations to watch; the daily job
      scans them and the prices show below. 3-night / 4-day round trips in November.</p>

    <div id="banner" class="banner" style="display:none"></div>

    <div class="card">
      <h2>Watchlist — destinations to track</h2>
      <div class="row">
        <input id="search" type="search" placeholder="Search city or state (e.g. Goa, Kerala, Mumbai)…" />
        <button id="save" disabled>Save watchlist</button>
      </div>
      <div id="chips" class="chips"></div>
      <div id="opts" class="opts"></div>
    </div>

    <div class="card">
      <h2>Cheapest fare per route — November <span id="runat" class="empty"></span></h2>
      <div id="dash-nov"></div>
    </div>

    <div class="card">
      <h2>Cheapest fare per route — August</h2>
      <div id="dash-aug"></div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="airports.js"></script>
  <script src="app.js"></script>
</body>
</html>
